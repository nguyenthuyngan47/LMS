[options]
admin_passwd = admin123
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_name = False
# Chỉ liệt kê DB khớp tên (tránh vào nhầm DB trống). Tạo database một lần với tên: lms
# Nếu DB của bạn tên khác: comment dòng dbfilter bên dưới.
dbfilter = ^lms$
db_template = template0
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo
http_port = 8069
http_interface = 0.0.0.0
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = :INFO
workers = 0
max_cron_threads = 2
list_db = True
proxy_mode = False
without_demo = False

# ----- Cấu hình gửi email (SMTP) - Chỉ cần sửa smtp_user và smtp_password bên dưới -----
# Ví dụ Gmail: dùng App Password (không dùng mật khẩu đăng nhập Gmail)
# Tạo App Password: Google Account > Bảo mật > Xác minh 2 bước > Mật khẩu ứng dụng
smtp_server = smtp.gmail.com
smtp_port = 587
smtp_encryption = tls
smtp_user = DO_THAY_EMAIL_CUA_BAN@gmail.com
smtp_password = DO_THAY_APP_PASSWORD

