# Dữ liệu thật nằm trong các Docker volume bên dưới (Postgres + filestore Odoo).
# Luôn dùng:  docker compose down
# KHÔNG dùng: docker compose down -v   (cờ -v xóa volume => mất toàn bộ DB như cài mới)
services:
  db:
    image: postgres:15
    container_name: odoo_db_8069
    restart: unless-stopped
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    ports:
      - "5432:5432"
    volumes:
      - odoo_db_8069_data:/var/lib/postgresql/data
    networks:
      - odoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:18.0
    container_name: odoo_app_8069
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8069:8069"
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
      - ODOO_RC=/etc/odoo/odoo.conf
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Đồng bộ CSV: master (hook + cron). 0 = tắt hết.
      - LMS_CSV_SYNC_ENABLED=${LMS_CSV_SYNC_ENABLED:-1}
      # Hook registry: mặc định 0 (nhanh). Cron vẫn sync khi SYNC_ENABLED=1.
      - LMS_CSV_ON_START=${LMS_CSV_ON_START:-0}
    env_file:
      - .env
    volumes:
      # Thư mục dữ liệu Odoo
      - odoo_web_8069_data:/var/lib/odoo
      
      # Log directory
      - odoo_8069_logs:/var/log/odoo

      # Module tùy chỉnh
      - ./addons:/mnt/extra-addons
      - ./lms:/mnt/extra-addons/lms
      - ./data:/mnt/extra-addons/data:ro
      # CSV bootstrap (post_init): trùng đường mặc định /mnt/extra-addons/data/export
      - ./scripts/export:/mnt/extra-addons/data/export:ro

      # Cấu hình riêng
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    networks:
      - odoo-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Không dùng --dev mặc định (reload/qweb chậm khởi động + request). Dev: thêm --dev=reload,qweb,werkzeug,xml
    command: ["odoo", "--config=/etc/odoo/odoo.conf"]

networks:
  odoo-network:
    driver: bridge

volumes:
  odoo_db_8069_data:
  odoo_web_8069_data:
  odoo_8069_logs:

